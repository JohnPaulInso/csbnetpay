<style>
    /* Autofill text and background styling */
    input:-webkit-autofill {
        font-family: 'Montserrat';
        background-color: #cfcfcf !important;
        /* Dark background */
        color: white !important;
        /* White text */
        border: 1px solid #222 !important;
        /* Border color */
        box-shadow: 0 0 0px 1000px #e7e7e7 inset !important;
        /* Fix autofill background */
    }

    /* When autofill is active and the input field is focused */
    input:-webkit-autofill:focus {
        background-color: #717171 !important;
        /* Dark background */
        border: 1px solid #222 !important;
        /* Border color */
        color: white !important;
        /* White text */
    }

    /* Ensure autofill placeholder text is white */
    input:-webkit-autofill::placeholder {
        color: white !important;
        /* White placeholder text */
        border: 1px solid #222 !important;
        /* Border color */
    }
</style>

<body>
    <div class="limiter">
        <div class="container-login100" style="background-image: url('images/bg-01.jpg');">
            <div class="wrap-login100 p-l-20 p-r-20 p-t-65 p-b-54 px-4" style="background-color:#222;">
                <form class="login100-form validate-form">
                    <span class="login100-form-title p-b-49 text-white"
                        style="font-family: 'Inter', sans-serif;font-size:30px">CSB Mobile Netpay</span>


                    <div class="wrap-input100 validate-input m-b-23 " data-validate="Username is required">
                        <span class="label-input100 text-white" style="font-family: 'Montserrat'">Username</span>
                        <input class="input100 pl-5" type="text" id="username"
                            style="font-size:15px; font-family: 'Montserrat';background-color: #222; color: white; border: 1px solid #222;"
                            name="username" placeholder="Type your username">
                        <span class="focus-input100 px-2" data-symbol="&#128100;"></span>
                    </div>



                    <div class="wrap-input100 validate-input" data-validate="Password is required">
                        <span class="label-input100 text-white" style="font-family: 'Montserrat'">Password</span>
                        <input class="input100 pl-5" type="password" id="password"
                            style="font-size:15px; font-family: 'Montserrat'; background-color: #222; color: white; border: 1px solid #222;"
                            name="pass" placeholder="Type your password">
                        <span class="focus-input100 px-2" data-symbol="&#128274;"></span>
                        <!-- Show/Hide Password Toggle -->
                        <input type="checkbox" id="togglePassword" class="position-absolute"
                            style="bottom: 10px; right: 10px;" onclick="togglePasswordVisibility()">
                    </div>

                    <script>
                        // Toggle password visibility
                        function togglePasswordVisibility() {
                            const passwordField = document.getElementById("password");
                            const togglePassword = document.getElementById("togglePassword");

                            if (togglePassword.checked) {
                                passwordField.type = "text";  // Show the password
                            } else {
                                passwordField.type = "password";  // Hide the password
                            }
                        }
                    </script>


                    <div class="container-login100-form-btn p-t-30">
                        <div class="wrap-login100-form-btn">
                            <div class="login100-form-bgbtn"></div>
                            <button type="button" class="login100-form-btn" id="login-btn"
                                style="font-family: 'Montserrat'" onclick="startLoading()">
                                <span id="login-text"><b>Login</b></span>
                                <div id="loading-spinner" class="spinner" style="display: none;"></div>
                            </button>
                        </div>
                    </div>
                    <div class="flex-col-c p-t-55">
                        <span class="txt1 p-b-17 text-gray" style="font-family:'Montserrat'">No Account? Contact
                            Administrator</span>
                        <a href="#" class="txt2 text-white"
                            style="font-family:'Montserrat'; margin-bottom: 10px;">Contact</a>

                        <!-- FIX: Added 'Change Credentials' button to allow editing usernames, emails and passwords -->
                        <!-- Date: 2026-07-07, Element: change-credentials-link -->
                        <a href="javascript:void(0);" id="change-credentials-link" onclick="openCredentialsModal()"
                            class="txt2 text-white"
                            style="font-family:'Montserrat'; text-decoration: underline; font-weight: bold; margin-top: 10px;">Change
                            Credentials (Email/Password)</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- FIX: Added credentialsModal popup modal to configure stored user accounts -->
    <!-- Date: 2026-07-07, Element: credentialsModal (id="credentialsModal") -->
    <!-- Function: A modal overlay allowing users to change emails, usernames, and passwords of pre-existing accounts. -->
    <div id="credentialsModal"
        style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center;">
        <div class="credentials-card"
            style="background: #222; border: 1px solid #4F2683; border-radius: 12px; max-width: 400px; width: 90%; padding: 25px; color: white; font-family: 'Montserrat', sans-serif; box-shadow: 0 8px 32px rgba(0,0,0,0.5);">
            <div
                style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;">
                <h5 style="margin: 0; font-family: 'Inter', sans-serif; font-size: 1.25rem; color: #fff;">Change
                    Credentials</h5>
                <button onclick="closeCredentialsModal()"
                    style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; line-height: 1;">&times;</button>
            </div>
            <div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #bbb; font-size: 0.9rem;">Select
                        Account</label>
                    <select id="modalSelectAccount" onchange="onModalAccountChange()"
                        style="width: 100%; padding: 8px 12px; background: #333; border: 1px solid #4F2683; color: white; border-radius: 6px;">
                        <option value="0">Account 1 (Admin - jonathan77)</option>
                        <option value="1">Account 2 (region7)</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #bbb; font-size: 0.9rem;">Username</label>
                    <input type="text" id="modalUsername"
                        style="width: 100%; padding: 8px 12px; background: #333; border: 1px solid #4F2683; color: white; border-radius: 6px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #bbb; font-size: 0.9rem;">Email
                        Address</label>
                    <input type="email" id="modalEmail"
                        style="width: 100%; padding: 8px 12px; background: #333; border: 1px solid #4F2683; color: white; border-radius: 6px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #bbb; font-size: 0.9rem;">Password</label>
                    <input type="text" id="modalPassword"
                        style="width: 100%; padding: 8px 12px; background: #333; border: 1px solid #4F2683; color: white; border-radius: 6px;">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px;">
                    <button onclick="closeCredentialsModal()"
                        style="background: #444; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Cancel</button>
                    <button onclick="saveCredentials()"
                        style="background: #4F2683; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;">Save
                        Changes</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        /* 
         * CHANGE DETAILS:
         * Element: netpay_accounts localStorage initialization
         * Date: 2026-07-07
         * Fix: Dynamically initialize user credentials list if not set in localStorage.
         */
        function getAccounts() {
            let accounts = localStorage.getItem("netpay_accounts");
            if (!accounts) {
                accounts = [
                    { username: "jonathan77", password: "atan77", email: "jonathan77@example.com" },
                    { username: "region7", password: "salesmenr7", email: "region7@example.com" }
                ];
                localStorage.setItem("netpay_accounts", JSON.stringify(accounts));
            } else {
                try {
                    accounts = JSON.parse(accounts);
                } catch (e) {
                    accounts = [
                        { username: "jonathan77", password: "atan77", email: "jonathan77@example.com" },
                        { username: "region7", password: "salesmenr7", email: "region7@example.com" }
                    ];
                    localStorage.setItem("netpay_accounts", JSON.stringify(accounts));
                }
            }
            return accounts;
        }

        function startLoading() {
            let loginText = document.getElementById("login-text");
            let loadingSpinner = document.getElementById("loading-spinner");
            let loginBtn = document.getElementById("login-btn");

            // Hide text and show spinner
            loginText.style.display = "none";
            loadingSpinner.style.display = "inline-block";
            loginBtn.disabled = true; // Disable button during loading

            setTimeout(() => {
                // Restore button text and call login function
                loadingSpinner.style.display = "none";
                loginText.style.display = "inline";
                loginBtn.disabled = false;
                login();
            }, 700);
        }

        // Function to handle login
        function login() {
            const usernameInput = document.getElementById("username").value.trim().toLowerCase();
            const passwordInput = document.getElementById("password").value;

            const accounts = getAccounts();
            /* 
             * CHANGE DETAILS:
             * Element: login form validation
             * Date: 2026-07-07
             * Fix: Match input username against either username or email in the dynamically loaded accounts database.
             */
            const matchedAccount = accounts.find(acc =>
                (acc.username.toLowerCase() === usernameInput || (acc.email && acc.email.toLowerCase() === usernameInput)) &&
                acc.password === passwordInput
            );

            if (matchedAccount) {
                // Store the login time and username in localStorage
                localStorage.setItem("loginTime", new Date().getTime());
                localStorage.setItem("loggedInUser", matchedAccount.username); // Store logged-in username

                // Redirect to index.html after successful login
                window.location.href = "../index.html";
            } else {
                alert("Invalid username/email or password");
            }
        }

        // Credentials Modal Functions
        function openCredentialsModal() {
            const modal = document.getElementById("credentialsModal");
            if (modal) {
                modal.style.display = "flex";
                onModalAccountChange();
            }
        }

        function closeCredentialsModal() {
            const modal = document.getElementById("credentialsModal");
            if (modal) modal.style.display = "none";
        }

        function onModalAccountChange() {
            const select = document.getElementById("modalSelectAccount");
            const index = parseInt(select.value, 10);
            const accounts = getAccounts();
            const account = accounts[index];

            if (account) {
                document.getElementById("modalUsername").value = account.username;
                document.getElementById("modalEmail").value = account.email || "";
                document.getElementById("modalPassword").value = account.password;
            }
        }

        function saveCredentials() {
            const select = document.getElementById("modalSelectAccount");
            const index = parseInt(select.value, 10);
            const usernameVal = document.getElementById("modalUsername").value.trim();
            const emailVal = document.getElementById("modalEmail").value.trim();
            const passwordVal = document.getElementById("modalPassword").value;

            if (!usernameVal || !passwordVal) {
                alert("Username and Password are required.");
                return;
            }

            const accounts = getAccounts();
            accounts[index] = {
                username: usernameVal,
                email: emailVal,
                password: passwordVal
            };

            localStorage.setItem("netpay_accounts", JSON.stringify(accounts));
            alert("Account credentials updated successfully!");
            closeCredentialsModal();
        }
    </script>


</body>
