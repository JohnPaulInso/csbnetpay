<!DOCTYPE html>
<html lang="en">

<head>
    <title>Netpay Login</title>
    <meta charset="UTF-8">
    <!-- (2026-07-13) Prevent dark scheme flash on load; prev: no meta -->
    <meta name="color-scheme" content="light">
    <!-- (2026-07-13) Prevent dark scheme flash on load; prev: no inline style -->
    <style>:root { color-scheme: light !important; }</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/csbnetpay/manifest.json">
    <link rel="icon" type="image/png" href="../favicon.png" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            /* (2026-07-13) Use light bg to prevent dark mode; prev: dark gradient */
            color-scheme: light !important;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            position: relative;
        }

        /* Static background elements for depth */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            will-change: transform;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #f39c12 0%, transparent 70%);
            top: -100px;
            left: -100px;
        }

        .orb2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8b4fc7 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            /* (2026-07-13) Set light color scheme on login card; prev: none */
            color-scheme: light !important;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 80px rgba(79, 38, 131, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4F2683, #6b35a8);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
            box-shadow: 
                0 10px 30px rgba(79, 38, 131, 0.4),
                0 0 60px rgba(79, 38, 131, 0.2);
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #9ca3af;
            transition: all 0.3s ease;
            z-index: 2;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f9fafb;
            color: #1f2937;
        }

        input:hover {
            border-color: #d1d5db;
            background: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #4F2683;
            background: white;
            box-shadow: 
                0 0 0 4px rgba(79, 38, 131, 0.1),
                0 8px 20px rgba(79, 38, 131, 0.15);
            transform: translateY(-2px);
        }

        input:focus + .input-icon {
            color: #4F2683;
            transform: translateY(-50%) scale(1.1);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            z-index: 2;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .password-toggle:hover {
            color: #4F2683;
            background: rgba(79, 38, 131, 0.1);
            transform: translateY(-50%) scale(1.1);
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.95);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%);
            color: #1a1a2e;
            box-shadow: 0 4px 16px rgba(243, 156, 18, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .login-btn:hover::before {
            opacity: 1;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 8px 24px rgba(243, 156, 18, 0.5),
                0 0 60px rgba(243, 156, 18, 0.3);
        }

        .login-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(26, 26, 46, 0.3);
            border-top: 3px solid #1a1a2e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
        }

        .footer-text {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .footer-link {
            color: #4F2683;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .footer-link:hover {
            background: rgba(79, 38, 131, 0.1);
            color: #6b35a8;
            transform: translateY(-2px);
        }

        .footer-link:active {
            transform: translateY(0);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
            margin: 24px 0;
        }

        /* Autofill styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px #f9fafb inset !important;
            -webkit-text-fill-color: #1f2937 !important;
            border-color: #4F2683 !important;
        }

        /* Ripple effect on button click */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .login-card {
                padding: 40px 32px;
            }

            h1 {
                font-size: 24px;
            }

            .logo {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }

            .bg-orb {
                filter: blur(80px);
            }
        }
    </style>
</head>

<body>
    <!-- Static background orbs -->
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <!-- Login container -->
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">
                    <i class="bi bi-wallet2"></i>
                </div>
                <h1>CSB Mobile Netpay</h1>
                <p class="subtitle">Secure payroll management system</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                        <i class="bi bi-person-fill input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <i class="bi bi-lock-fill input-icon"></i>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="loginText">Login</span>
                    <span id="loadingSpinner" class="spinner" style="display: none;"></span>
                </button>
            </form>

            <div class="divider"></div>

            <div class="footer-links">
                <p class="footer-text">Need help accessing your account?</p>
                <a href="#" class="footer-link">
                    <i class="bi bi-envelope-fill"></i> Contact Administrator
                </a>
            </div>
        </div>
    </div>

    <script>
        // Initialize accounts in localStorage
        function getAccounts() {
            let accounts = localStorage.getItem("netpay_accounts");
            if (!accounts) {
                accounts = [
                    { username: "jonathan77", password: "atan77", email: "jonathan77@example.com" },
                    { username: "region7", password: "salesmenr7", email: "region7@example.com" }
                ];
                localStorage.setItem("netpay_accounts", JSON.stringify(accounts));
            } else {
                try {
                    accounts = JSON.parse(accounts);
                } catch (e) {
                    accounts = [
                        { username: "jonathan77", password: "atan77", email: "jonathan77@example.com" },
                        { username: "region7", password: "salesmenr7", email: "region7@example.com" }
                    ];
                    localStorage.setItem("netpay_accounts", JSON.stringify(accounts));
                }
            }
            return accounts;
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordField = document.getElementById("password");
            const toggleIcon = document.getElementById("toggleIcon");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleIcon.className = "bi bi-eye-slash";
            } else {
                passwordField.type = "password";
                toggleIcon.className = "bi bi-eye";
            }
        }

        // Ripple effect on button click
        function createRipple(event) {
            const button = event.currentTarget;
            const ripple = document.createElement('span');
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = event.clientX - rect.left - size / 2;
            const y = event.clientY - rect.top - size / 2;

            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');

            button.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Form submission
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            startLoading();
        });

        document.getElementById("loginBtn").addEventListener("click", createRipple);

        function startLoading() {
            const loginText = document.getElementById("loginText");
            const loadingSpinner = document.getElementById("loadingSpinner");
            const loginBtn = document.getElementById("loginBtn");

            loginText.style.display = "none";
            loadingSpinner.style.display = "inline-block";
            loginBtn.disabled = true;

            setTimeout(() => {
                loadingSpinner.style.display = "none";
                loginText.style.display = "inline";
                loginBtn.disabled = false;
                login();
            }, 700);
        }

        function login() {
            const usernameInput = document.getElementById("username").value.trim().toLowerCase();
            const passwordInput = document.getElementById("password").value;

            const accounts = getAccounts();
            const matchedAccount = accounts.find(acc =>
                (acc.username.toLowerCase() === usernameInput || 
                (acc.email && acc.email.toLowerCase() === usernameInput)) &&
                acc.password === passwordInput
            );

            if (matchedAccount) {
                localStorage.setItem("loginTime", new Date().getTime());
                localStorage.setItem("loggedInUser", matchedAccount.username);
                window.location.href = "../index.html";
            } else {
                alert("Invalid username/email or password");
            }
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../service-worker.js');
        }
    </script>
</body>

</html>
